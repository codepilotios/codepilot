name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test and Audit
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Privacy audit
        run: scripts/privacy-audit.sh

      - name: Public presence audit
        run: scripts/public-presence-audit.sh

      - name: SwiftPM tests
        run: swift test

      - name: Gateway tests
        working-directory: gateway
        run: python3 -m unittest test_codex_phone_gateway.py test_remote_desktop_gateway.py

      - name: Gateway token process-argument guard
        run: scripts/tests/gateway-token-argv-test.sh

      - name: Fastlane syntax
        run: ruby -c ios/CodexPhone/fastlane/Fastfile

      - name: iOS simulator build
        run: |
          xcodebuild \
            -project ios/CodexPhone/CodexPhone.xcodeproj \
            -scheme CodexPhone \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
